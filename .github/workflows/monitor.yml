name: Monitor SET News to Telegram

on:
  schedule:
    # ช่วง 23:00 UTC ของ อา-พฤ (=6:00 น. เวลาไทยของ จ-ศ)
    - cron: "*/15 23 * * 0-4"
    # ช่วง 00:00-10:45 UTC ของ จ-ศ (=7:00-17:45 น. เวลาไทย)
    - cron: "*/15 0-10 * * 1-5"
    # 11:00 UTC พอดีของ จ-ศ (=18:00 น. เวลาไทยพอดี)
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

jobs:
  check-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_set_news.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state.json [skip ci]"
          git push
