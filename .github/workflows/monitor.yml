name: Monitor SET News to Telegram

on:
  schedule:
    # เวลาใน cron เป็น UTC เสมอ (เวลาไทย = UTC + 7 ชม.) จึงต้องแยกเป็นหลายบรรทัดเพื่อให้ตรงตามที่ต้องการ:
    #   06:00-08:00 น. ไทย -> ทุก 30 นาที
    #   08:00-17:00 น. ไทย -> ทุก 15 นาที
    #   17:00-22:00 น. ไทย -> ทุก 30 นาที

    # ช่วง 6:00-7:30 น. ไทย ทุก 30 นาที (คาบเกี่ยวข้ามวันใน UTC เลยแยก 2 บรรทัดย่อย)
    - cron: "0,30 23 * * 0-4"   # 23:00,23:30 UTC (วันก่อนหน้า) = 06:00,06:30 น. ไทย
    - cron: "0,30 0 * * 1-5"    # 00:00,00:30 UTC = 07:00,07:30 น. ไทย

    # ช่วง 8:00-16:45 น. ไทย ทุก 15 นาที
    - cron: "*/15 1-9 * * 1-5"  # 01:00-09:45 UTC = 08:00-16:45 น. ไทย

    # ช่วง 17:00-22:00 น. ไทย ทุก 30 นาที
    - cron: "*/30 10-14 * * 1-5"  # 10:00-14:30 UTC = 17:00-21:30 น. ไทย
    - cron: "0 15 * * 1-5"        # 15:00 UTC พอดี = 22:00 น. ไทยพอดี

  workflow_dispatch: {}   # ให้กดรันเองได้จากแท็บ Actions เพื่อทดสอบ

jobs:
  check-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_set_news.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state.json [skip ci]"
          git push
