name: Monitor SET News to Telegram

on:
  schedule:
    # เก็บ schedule ในตัวไว้เป็น backup (อาจดีเลย์ได้บ้างตามข้อจำกัดของ GitHub)
    # เวลาใน cron เป็น UTC เสมอ (เวลาไทย = UTC + 7 ชม.)
    - cron: "7,37 23 * * 0-4"   # 23:07,23:37 UTC (วันก่อนหน้า) = 06:07,06:37 น. ไทย
    - cron: "7,37 0 * * 1-5"    # 00:07,00:37 UTC = 07:07,07:37 น. ไทย
    - cron: "7,22,37,52 1-9 * * 1-5"  # 01:07-09:52 UTC = 08:07-16:52 น. ไทย
    - cron: "7,37 10-14 * * 1-5"  # 10:07-14:37 UTC = 17:07-21:37 น. ไทย
    - cron: "7 15 * * 1-5"        # 15:07 UTC = 22:07 น. ไทย

  # ให้บริการ cron ภายนอก (เช่น cron-job.org) เรียก GitHub API มาสั่งรันได้ตรงเวลากว่า
  # native schedule ด้านบน ดูวิธีตั้งค่าใน README หัวข้อ "ใช้ cron ภายนอกแทน (แม่นยำกว่า)"
  repository_dispatch:
    types: [run-check]

  workflow_dispatch: {}   # ให้กดรันเองได้จากแท็บ Actions เพื่อทดสอบ

jobs:
  check-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_set_news.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state.json [skip ci]"
          git push
