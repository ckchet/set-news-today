name: Monitor SET News to Telegram

on:
  schedule:
    # 08:00-18:00 เวลาไทย (UTC+7) = 01:00-11:00 UTC, ทุก 15 นาที, จันทร์-ศุกร์
    # เวลาใน cron เป็น UTC เสมอ จึงแยกเป็น 2 บรรทัดเพื่อให้ครอบคลุมถึง 18:00 น. พอดี
    - cron: "*/15 1-10 * * 1-5"
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}   # ให้กดรันเองได้จากแท็บ Actions เพื่อทดสอบ

jobs:
  check-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_set_news.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state.json [skip ci]"
          git push
