name: Monitor SET News to Telegram

on:
  schedule:
    # เวลาใน cron เป็น UTC เสมอ (เวลาไทย = UTC + 7 ชม.)
    # หมายเหตุ: จงใจเลื่อนนาทีให้เยื้องจากเลขกลมๆ (0,15,30,45) เป็นนาทีที่ 7,22,37,52 แทน
    # เพราะ GitHub Actions มีคนตั้ง schedule ตรงนาทีกลมๆ พร้อมกันทั่วโลกเยอะมาก
    # ทำให้ช่วงเวลานั้นคิวแน่นและถูกดีเลย์/ข้ามได้บ่อยกว่าปกติ การเยื้องเวลาช่วยให้รันตรงเวลาขึ้น

    # ช่วง 6:00-7:30 น. ไทย ทุก 30 นาที (คาบเกี่ยวข้ามวันใน UTC เลยแยก 2 บรรทัดย่อย)
    - cron: "7,37 23 * * 0-4"   # 23:07,23:37 UTC (วันก่อนหน้า) = 06:07,06:37 น. ไทย
    - cron: "7,37 0 * * 1-5"    # 00:07,00:37 UTC = 07:07,07:37 น. ไทย

    # ช่วง 8:00-16:45 น. ไทย ทุก 15 นาที
    - cron: "7,22,37,52 1-9 * * 1-5"  # 01:07-09:52 UTC = 08:07-16:52 น. ไทย

    # ช่วง 17:00-22:00 น. ไทย ทุก 30 นาที
    - cron: "7,37 10-14 * * 1-5"  # 10:07-14:37 UTC = 17:07-21:37 น. ไทย
    - cron: "7 15 * * 1-5"        # 15:07 UTC = 22:07 น. ไทย

  workflow_dispatch: {}   # ให้กดรันเองได้จากแท็บ Actions เพื่อทดสอบ

jobs:
  check-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_set_news.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state.json [skip ci]"
          git push
